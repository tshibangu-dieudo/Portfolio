<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">Portfolio</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>

      <ul class="navbar-nav ms-auto">

        <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<section class="section-light py-5">
  <div class="container">
    <h2 class="text-center mb-4">Contactez-moi</h2>
    <p class="text-center mb-5">Envoyez-moi un message et je vous répondrai dès que possible.</p>

    <div class="row justify-content-center">
      <div class="col-md-8">
        <form action="https://formspree.io/f/xqeybdjq" method="POST">
          <div class="mb-3">
            <label for="name" class="form-label">Nom</label>
            <input type="text" class="form-control" id="name" name="name" required>
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" required>
          </div>

          <div class="mb-3">
            <label for="subject" class="form-label">Sujet</label>
            <input type="text" class="form-control" id="subject" name="subject" required>
          </div>

          <div class="mb-3">
            <label for="message" class="form-label">Message</label>
            <textarea class="form-control" id="message" name="message" rows="5" required></textarea>
          </div>

          <button type="submit" class="btn btn-primary btn-lg btn-custom">Envoyer</button>
        </form>
      </div>
    </div>
  </div>
</section>

<footer class="bg-dark text-white text-center p-3 mt-5">
  <p>© 2026 Dieudo Tshibangu - Portfolio</p>
